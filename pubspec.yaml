name: splendor_fake
description: A new Flutter project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- 1. ICON CHUẨN ---
  cupertino_icons: ^1.0.8

  # --- 2. FIREBASE & LOGIN (Bản mới nhất) ---
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  http: ^1.2.0 # Gọi Vercel API
  google_sign_in: ^6.2.1

  # --- 3. QUẢN LÝ TRẠNG THÁI & TIỆN ÍCH ---
  provider: ^6.1.2
  uuid: ^4.4.0
  shared_preferences: ^2.2.3 # Lưu cài đặt người dùng
  intl: ^0.19.0 # Để định dạng tiền tệ, ngày tháng

  # --- 4. GIAO DIỆN & HIỆU ỨNG ---
  google_fonts: ^6.2.1 # Font chữ đẹp
  flutter_animate: ^4.5.0 # Hiệu ứng chuyển động
  glassmorphism: ^3.0.0 # (QUAN TRỌNG) Hiệu ứng kính mờ cho thẻ bài
  # --- 5. ÂM THANH ---
  audioplayers: ^5.2.1
  agora_rtc_engine: ^6.3.2 # Thư viện Voice Chat tốt nhất cho Flutter
  permission_handler: ^11.3.0 # Để xin quyền Micro
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # --- CẤU HÌNH ẢNH ---
  assets:
    - assets/images/
    - assets/avatars/
    - assets/audio/
