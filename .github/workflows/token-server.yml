name: Token Server (Agora)

on:
  push:
    branches: [main]
    paths:
      - "agora-token-server/**"
      - ".github/workflows/token-server.yml"
  pull_request:
    branches: [main]
    paths:
      - "agora-token-server/**"
      - ".github/workflows/token-server.yml"

jobs:
  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agora-token-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agora-token-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node -c api/token.js

