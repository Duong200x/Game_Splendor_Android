<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Splendor Fake architecture overview</title>
  <desc id="desc">High-level diagram showing Flutter UI, online game manager, Firestore room state, and optional Agora voice service.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="p1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="p2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="p3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="p4" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#e2e8f0"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #f8fafc; }
      .title { font-size: 40px; font-weight: 800; }
      .muted { font-size: 24px; opacity: 0.8; }
      .label { font-size: 26px; font-weight: 700; }
      .small { font-size: 22px; opacity: 0.92; }
      .line { stroke: #e2e8f0; stroke-width: 4; fill: none; marker-end: url(#arrow); opacity: 0.9; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>

  <text x="70" y="74" class="title">Splendor Fake - Multiplayer System Overview</text>
  <text x="70" y="112" class="muted">Flutter client for realtime rooms, turn-based transactions, timeout handling, and optional mobile voice chat</text>

  <g filter="url(#shadow)">
    <rect x="70" y="175" width="290" height="160" rx="28" fill="url(#p1)"/>
    <text x="106" y="224" class="label">Flutter Screens</text>
    <text x="106" y="260" class="small">Login, Home, Room,</text>
    <text x="106" y="292" class="small">OnlineGameBoard,</text>
    <text x="106" y="324" class="small">Profile and Rules</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="455" y="175" width="310" height="160" rx="28" fill="url(#p2)"/>
    <text x="492" y="224" class="label">Game Orchestration</text>
    <text x="492" y="260" class="small">OnlineGameManager</text>
    <text x="492" y="292" class="small">transactions, host checks,</text>
    <text x="492" y="324" class="small">turn advance, stale cleanup</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="860" y="175" width="270" height="160" rx="28" fill="url(#p3)"/>
    <text x="895" y="224" class="label">Firestore</text>
    <text x="895" y="260" class="small">splendor_rooms</text>
    <text x="895" y="292" class="small">players, status,</text>
    <text x="895" y="324" class="small">gameState, decks</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="440" width="320" height="170" rx="28" fill="#334155"/>
    <text x="146" y="490" class="label">Support Systems</text>
    <text x="146" y="528" class="small">Firebase Auth</text>
    <text x="146" y="560" class="small">Google Sign-In</text>
    <text x="146" y="592" class="small">sound manager and assets</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="475" y="440" width="320" height="170" rx="28" fill="url(#p4)"/>
    <text x="510" y="490" class="label">Realtime UX</text>
    <text x="510" y="528" class="small">presence heartbeat</text>
    <text x="510" y="560" class="small">turn countdown + timeout</text>
    <text x="510" y="592" class="small">reserved card visibility rules</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="840" y="440" width="290" height="170" rx="28" fill="#0f766e"/>
    <text x="875" y="490" class="label">Voice Layer</text>
    <text x="875" y="528" class="small">Agora mobile service</text>
    <text x="875" y="560" class="small">token server on Vercel</text>
    <text x="875" y="592" class="small">web stub fallback</text>
  </g>

  <path class="line" d="M360 255 L455 255"/>
  <path class="line" d="M765 255 L860 255"/>
  <path class="line" d="M600 335 L600 440"/>
  <path class="line" d="M500 335 L300 440"/>
  <path class="line" d="M710 335 L980 440"/>

  <text x="72" y="670" class="muted">Focus areas: multiplayer room lifecycle, transaction-safe turn logic, anti-race guards, and cross-platform voice integration.</text>
</svg>
